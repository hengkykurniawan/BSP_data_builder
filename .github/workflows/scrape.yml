name: BPS Database Scraper

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      subject_ids:
        description: 'Comma-separated BPS Subject IDs (e.g. 3,8,11) or "all" for everything'
        required: false
        default: '3,8,11,13,169,6,23,26'

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Allows committing database back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run API Scraper
        env:
          BPS_API_KEY: ${{ secrets.BPS_API_KEY }}
        run: |
          python scraper_api.py "${{ github.event.inputs.subject_ids || '3,8,11,13,169,6,23,26' }}"

      - name: Generate Data Summary Dashboard
        run: |
          python generate_summary.py

      - name: Upload SQLite Database as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bps-sqlite-db
          path: bps_data.db
          if-no-files-found: warn

      - name: Commit and Push Database and Summary Page
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bps_data.db docs/
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "cron: auto-update BPS database & summary dashboard"
            git push
          fi
