name: BPS Database Scraper

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      subject_id:
        description: 'BPS Subject ID (e.g. 530 for Macroeconomic Statistics)'
        required: true
        default: '530'
      browser_type:
        description: 'Browser type for Playwright'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Allows committing database back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps ${{ github.event.inputs.browser_type || 'chromium' }}

      - name: Run Scraper
        run: |
          python scraper.py ${{ github.event.inputs.subject_id || '530' }} ${{ github.event.inputs.browser_type || 'chromium' }}

      - name: Generate Data Summary Dashboard
        run: |
          python generate_summary.py

      - name: Upload SQLite Database as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bps-sqlite-db
          path: bps_data.db
          if-no-files-found: error

      - name: Commit and Push Database and Summary Page
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bps_data.db docs/
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "cron: auto-update BPS database & summary dashboard"
            git push
          fi
